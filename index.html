<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Settings | FlyRank</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <div class="settings-card">
      <header class="settings-header">
        <h1>Account Settings</h1>
        <p>Manage your profile, security, and preferences.</p>
      </header>

      <div id="successBanner" class="banner banner--success" hidden>
        Settings saved successfully.
      </div>

      <form id="settingsForm" novalidate>
        <!-- Profile section -->
        <fieldset class="section">
          <legend>Profile</legend>

          <div class="field">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" name="fullName" autocomplete="name" placeholder="Jane Doe" />
            <span class="error-text" id="fullNameError"></span>
          </div>

          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" placeholder="jane@example.com" />
            <span class="error-text" id="emailError"></span>
          </div>

          <div class="field">
            <label for="bio">Bio <span class="optional">(optional)</span></label>
            <textarea id="bio" name="bio" rows="3" maxlength="200" placeholder="Tell us a little about yourself"></textarea>
            <span class="hint"><span id="bioCount">0</span>/200</span>
          </div>
        </fieldset>

        <!-- Password section -->
        <fieldset class="section">
          <legend>Change Password</legend>

          <div class="field">
            <label for="currentPassword">Current password</label>
            <input type="password" id="currentPassword" name="currentPassword" autocomplete="current-password" />
            <span class="error-text" id="currentPasswordError"></span>
          </div>

          <div class="field">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" />
            <span class="hint">At least 8 characters, including a number.</span>
            <span class="error-text" id="newPasswordError"></span>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" />
            <span class="error-text" id="confirmPasswordError"></span>
          </div>
        </fieldset>

        <!-- Notifications section -->
        <fieldset class="section">
          <legend>Notifications</legend>

          <div class="field field--toggle">
            <label for="emailNotifications">Email notifications</label>
            <input type="checkbox" id="emailNotifications" name="emailNotifications" class="toggle" />
          </div>

          <div class="field field--toggle">
            <label for="smsNotifications">SMS notifications</label>
            <input type="checkbox" id="smsNotifications" name="smsNotifications" class="toggle" />
          </div>

          <div class="field field--toggle">
            <label for="pushNotifications">Push notifications</label>
            <input type="checkbox" id="pushNotifications" name="pushNotifications" class="toggle" />
          </div>
        </fieldset>

        <!-- Preferences section -->
        <fieldset class="section">
          <legend>Preferences</legend>

          <div class="field">
            <label for="theme">Theme</label>
            <select id="theme" name="theme">
              <option value="system">System default</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>

          <div class="field">
            <label for="language">Language</label>
            <select id="language" name="language">
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="ur">Urdu</option>
            </select>
          </div>
        </fieldset>

        <div class="actions">
          <button type="button" id="resetButton" class="btn btn--secondary">Reset</button>
          <button type="submit" class="btn btn--primary">Save Changes</button>
        </div>
      </form>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
